name: Bug report
description: Report a bug in openharness
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: |
        Minimal code to reproduce. Ideally a single pytest test case or a
        short Python snippet.
      render: python
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual output
      description: Stack trace, log output, or observed behavior.
      render: shell
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: openharness version
      placeholder: "0.1.5"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12.1"
    validations:
      required: true

  - type: dropdown
    id: backend
    attributes:
      label: LLM backend
      options:
        - Anthropic
        - OpenAI
        - Custom / other
        - Mock / no backend
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues for duplicates.
          required: true
        - label: I have upgraded to the latest version and the bug still reproduces.
          required: false
