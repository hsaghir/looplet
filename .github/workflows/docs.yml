name: Docs

on:
  pull_request:
    branches: [master]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "CHANGELOG.md"
      - "CONTRIBUTING.md"
      - "ROADMAP.md"
      - ".github/workflows/docs.yml"
  push:
    branches: [master]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "CHANGELOG.md"
      - "CONTRIBUTING.md"
      - "ROADMAP.md"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }

      - name: Install docs dependencies
        run: pip install -r docs/requirements.txt

      - name: Build
        # docs/index.md is committed directly.
        # docs/{roadmap,contributing,changelog}.md are symlinks to
        # the root-level canonical files - mkdocs follows them.
        run: mkdocs build --strict

      - uses: actions/upload-pages-artifact@v3
        if: github.event_name != 'pull_request'
        with: { path: site }

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
