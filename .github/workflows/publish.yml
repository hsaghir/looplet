name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to build (publishing requires a matching vX.Y.Z tag)"
        required: true
        type: string

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.12

      - name: Validate release version
        env:
          REQUESTED_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
        run: |
          PROJECT_VERSION=$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')
          REQUESTED_VERSION=${REQUESTED_VERSION#v}
          test "$REQUESTED_VERSION" = "$PROJECT_VERSION" || {
            echo "Release version $REQUESTED_VERSION does not match package version $PROJECT_VERSION" >&2
            exit 1
          }

      - name: Run tests
        run: uv sync --all-extras && uv run pytest -q --tb=short

      - name: Build sdist + wheel
        run: uv build

      - name: Smoke-test installed wheel
        run: |
          smoke_env=$(mktemp -d)
          uv venv "$smoke_env" --python 3.12
          uv pip install --python "$smoke_env/bin/python" dist/*.whl
          "$smoke_env/bin/python" scripts/smoke_built_wheel.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  publish:
    name: publish to PyPI
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/looplet
    permissions:
      id-token: write  # required for PyPI trusted publishing
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Uses PyPI trusted publishing - no API token needed.
          # Configure at: https://pypi.org/manage/project/looplet/settings/publishing/
          skip-existing: true

  release:
    name: create GitHub release
    needs: [build, publish]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Extract release notes
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          awk -v version="$VERSION" '
            $0 ~ "^## \\[" version "\\]" { capture = 1; next }
            capture && $0 ~ "^## \\[" { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.md
          test -s release-notes.md

      - name: Create or repair GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" \
              --title "Looplet ${GITHUB_REF_NAME#v}" \
              --notes-file release-notes.md
            gh release upload "$GITHUB_REF_NAME" dist/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/* \
              --verify-tag \
              --title "Looplet ${GITHUB_REF_NAME#v}" \
              --notes-file release-notes.md
          fi
