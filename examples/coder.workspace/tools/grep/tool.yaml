name: grep
description: Search file contents with regex. Returns file:line:content.
parameters:
  pattern:
    type: string
    description: Regex pattern.
  path:
    type: string
    description: Search root (relative to project).
    default: "."
  include:
    type: string
    description: Optional --include filter (e.g. "*.py").
    default: ""
concurrent_safe: true
