# MCP-transport demo cartridge.
#
# The `add` tool comes from an out-of-process MCP server, NOT from a
# `tools/add/execute.py` file. The cartridge declares the server's
# command; the loader spawns it on load, runs MCP discovery, and
# registers each discovered tool into the agent's registry alongside
# the in-process `done` tool.
#
# This is the spec-v2 path for cross-language tools: the same
# cartridge can run on any future loader (Rust, Go, TypeScript) that
# implements the MCP stdio transport — no Python required for the
# tool body. See SPEC.md "MCP servers (v2.0 slot)".

max_steps: 5
done_tool: done

mcp_servers:
  calc:
    # The server lives next to this file at _server/calc.py — fully
    # self-contained, no npm/Node required. {{cartridge_root}} is the
    # absolute path of this cartridge's root directory, injected by
    # the loader so the spawned command finds the bundled server
    # regardless of where the cartridge was checked out.
    command: "python3 ${runtime.cartridge_root}/_server/calc.py"
    timeout_s: 10
    # No `tools:` allow-list → register every tool the server exposes.
