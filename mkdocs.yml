site_name: Looplet
site_description: Test-driven harness engineering for Python agents. Own the loop. Test every change.
site_url: https://hsaghir.com/looplet/
repo_url: https://github.com/hsaghir/looplet
repo_name: hsaghir/looplet
edit_uri: edit/master/docs/
exclude_docs: |
  launch/
  demo.gif
  looplet_new.gif

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
    logo: material/sync
  font:
    text: IBM Plex Sans
    code: IBM Plex Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.path
    - navigation.top
    - navigation.footer
    - navigation.instant
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.code.select
    - content.tabs.link
    - content.tooltips
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Light mode

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/hsaghir/looplet
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/looplet/

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mermaid.mjs
  - javascripts/accessibility.js

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      permalink_title: Anchor link
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: looplet-mermaid-source
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

nav:
  - Home: index.md
  - Start:
    - Install and configure: install.md
    - Quickstart: quickstart.md
    - Tutorial: tutorial.md
    - Migrate an existing loop: migrate.md
    - Troubleshooting: troubleshooting.md
  - Guides:
    - Build:
      - Cartridges: cartridge.md
      - Hooks: hooks.md
      - Skills and bundles: skills.md
      - Agent factory: agent-factory.md
    - Test:
      - Failure to regression: regression-demo.md
      - Choose the right experiment: experiments.md
      - Capture and replay: provenance.md
      - Behavioral evals: evals.md
    - Operate:
      - Runtime operations: operations.md
      - Recipes: recipes.md
      - Portability: portability.md
  - Reference:
    - CLI: cli.md
    - Python API map: api.md
    - Saved artifacts: artifacts.md
    - Pitfalls: pitfalls.md
  - Concepts:
    - Why Looplet: why-looplet.md
    - FAQ: faq.md
    - Evidence and benchmarks: benchmarks.md
  - Project:
    - Roadmap: roadmap.md
    - Changelog: changelog.md
  - Contribute:
    - Contributing: contributing.md
    - Good first issues: good-first-issues.md
    - Demo recording: demo-script.md

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'
  - redirects:
      redirect_maps:
        getting-started.md: quickstart.md
